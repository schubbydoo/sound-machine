<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Spark Station</title>
<style>
:root {
  --bg:          #121212;
  --panel:       #1A1A1A;
  --panel-deep:  #0D0D0D;
  --divider:     #2A2A2A;
  --text:        #F2F2F2;
  --text-sec:    #B8B8B8;
  --text-muted:  #7A7A7A;
  --accent:      #7DD3C0;
  --accent-dim:  rgba(125,211,192,0.15);
  --accent-glow: rgba(125,211,192,0.30);
  --hint-border: #4A4A4A;
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  cursor: none !important;
}
html, body {
  width: 800px; height: 480px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  cursor: none;
}
#app {
  width: 800px; height: 480px;
  display: flex; flex-direction: column;
}

/* ══ TOP AREA ═══════════════════════════════════════════════════ */
#scroll-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 20px 8px;
  background: var(--bg);
  flex-shrink: 0;
  position: relative;
}

#title {
  font-size: 46px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  letter-spacing: -1px;
  margin-bottom: 2px;
  white-space: nowrap;
}

.subtitle {
  font-size: 26px;
  color: var(--text-sec);
  text-align: center;
  font-weight: 500;
  line-height: 1.3;
  white-space: nowrap;
}

/* ══ TRACK ROW (selector + library button side by side) ════════ */
#track-row {
  display: flex;
  align-items: center;
  width: 100%;
  margin-top: 10px;
  gap: 8px;
}
#track-selector-btn {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  background: var(--panel);
  border-radius: 12px;
  border: 2px solid var(--accent);
  padding: 10px 22px;
  flex: 1;
  box-shadow: 0 0 12px var(--accent-glow);
  transition: background 0.12s;
  -webkit-tap-highlight-color: rgba(125,211,192,0.15);
}
#track-selector-btn:active { background: #252525; }

#selector-text {
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
}
#selector-arrow {
  font-size: 20px;
  color: var(--accent);
  font-weight: 700;
}

#instruction-text {
  font-size: 20px;
  font-weight: 500;
  font-style: italic;
  color: var(--text);
  text-align: center;
  margin-top: 6px;
  line-height: 1.3;
  min-height: 24px;
  width: 100%;
}

#library-btn {
  background: none;
  border: 1.5px solid var(--text-muted);
  border-radius: 10px;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  padding: 9px 14px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.03em;
  transition: border-color 0.15s, color 0.15s;
  /* match height of track selector */
  align-self: stretch;
  display: flex;
  align-items: center;
}
#library-btn:active {
  border-color: var(--accent);
  color: var(--accent);
}

/* ══ MIDDLE SPACER ══════════════════════════════════════════════ */
#mid-spacer {
  flex: 1;
  min-height: 0;
  background: var(--bg);
}

/* ══ BOTTOM PANEL ═══════════════════════════════════════════════ */
#result-panel {
  background: transparent;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 0 24px 18px;
}

#drag-handle { display: none; }
#drag-pill   { display: none; }

#btn-label-row {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}
#btn-label {
  font-size: 22px;
  color: var(--text-sec);
  text-align: center;
  font-weight: 500;
}

#panel-controls {
  display: flex;
  flex-direction: row;
  gap: 12px;
}

#hint-btn {
  flex: 3;
  background: var(--panel-deep);
  color: var(--text);
  border: 2px solid var(--hint-border);
  border-radius: 12px;
  padding: 16px 0;
  font-size: 22px;
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: opacity 0.1s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
#hint-btn:disabled { opacity: 0.28; }
#hint-btn:active:not(:disabled) { transform: scale(0.96); }
#hint-btn.lit { border-color: #888; background: #1c1c1c; }

#reveal-btn {
  flex: 5;
  background: var(--accent);
  color: #121212;
  border: none;
  border-top: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 16px 0;
  font-size: 24px;
  font-weight: 700;
  box-shadow: 0 3px 10px var(--accent-glow);
  transition: opacity 0.1s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
#reveal-btn:disabled { background: #2E4D47; box-shadow: none; }
#reveal-btn:active:not(:disabled) { transform: scale(0.96); }
#reveal-btn.lit { box-shadow: 0 3px 18px var(--accent-glow); }

#stop-btn {
  flex: 2;
  background: var(--panel-deep);
  color: var(--text);
  border: 2px solid var(--hint-border);
  border-radius: 12px;
  padding: 16px 0;
  font-size: 22px;
  font-weight: 600;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: opacity 0.1s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
#stop-btn:active { transform: scale(0.96); }

#display-box {
  margin-top: 10px;
  background: var(--panel-deep);
  border-radius: 10px;
  border: 1px solid var(--divider);
  border-left: 3px solid var(--hint-border);
  padding: 14px 18px 22px;
  display: none;
}
#display-box.hint-mode   { border-left-color: var(--hint-border); display: block; }
#display-box.answer-mode { border-left-color: var(--accent); background: rgba(125,211,192,0.06); display: block; }

#display-content {
  font-size: 20px;
  font-weight: 400;
  color: var(--text-sec);
  text-align: center;
  line-height: 1.5;
}
#display-box.answer-mode #display-content {
  color: var(--accent);
  font-weight: 500;
  font-size: 22px;
}

/* ══ TRACK PICKER MODAL ═════════════════════════════════════════ */
#picker-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
#picker-overlay.open { opacity: 1; pointer-events: all; }

#picker-sheet {
  background: #1E1E1E;
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  border-top: 1px solid var(--divider);
  transform: translateY(16px);
  transition: transform 0.2s;
  max-height: 380px;
  overflow-y: auto;
}
#picker-overlay.open #picker-sheet { transform: translateY(0); }

#picker-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--divider);
  position: sticky;
  top: 0;
  background: #1E1E1E;
}
#picker-title  { font-size: 26px; font-weight: 600; color: var(--text); }
#picker-done   { font-size: 22px; font-weight: 600; color: var(--accent); background: none; border: none; padding: 4px 0; }

.picker-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--divider);
  transition: background 0.1s;
}
.picker-item:last-child { border-bottom: none; }
.picker-item:active  { background: var(--accent-dim); }
.picker-item.selected { background: var(--accent-dim); }
.picker-item-text { font-size: 22px; color: var(--text); }
.picker-item.selected .picker-item-text { color: var(--accent); font-weight: 600; }
.picker-check { font-size: 22px; color: var(--accent); opacity: 0; }
.picker-item.selected .picker-check { opacity: 1; }
</style>
</head>
<body>
<div id="app">

  <div id="scroll-area">
    <div id="title">Memory Spark Station</div>
    <div class="subtitle">Tap and select a Track.</div>
    <div class="subtitle">Press a button to snap the memory back.</div>
    <div id="track-row">
      <div id="track-selector-btn">
        <span id="selector-text">Loading…</span>
        <span id="selector-arrow">▼</span>
      </div>
      <button id="library-btn">≡ Library</button>
    </div>
    <div id="instruction-text"></div>
  </div>

  <div id="mid-spacer"></div>

  <div id="result-panel">
    <div id="btn-label-row"><div id="btn-label">No button selected</div></div>
    <div id="panel-controls">
      <button id="hint-btn"   disabled>Hint</button>
      <button id="reveal-btn" disabled>Reveal</button>
      <button id="stop-btn"          >Stop</button>
    </div>
    <div id="display-box">
      <div id="display-content"></div>
    </div>
  </div>

</div>

<div id="picker-overlay" onclick="closePicker()">
  <div id="picker-sheet" onclick="event.stopPropagation()">
    <div id="picker-header">
      <span id="picker-title">Playlist</span>
      <button id="picker-done">Done</button>
    </div>
    <div id="picker-list"></div>
  </div>
</div>

<script>
const S = {
  activeProfileId: null,
  playlist:        [],
  lastButton:      null,
  hint:            null,
  answer:          null,
  instruction:     '',
  displayMode:     'none',
};

const $ = id => document.getElementById(id);

function rowColor(n) {
  if (n <= 4)  return '#7DD3C0';
  if (n <= 8)  return '#5B9BD5';
  if (n <= 12) return '#E57373';
  return '#F5F5F5';
}

function onTap(el, fn) {
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (el.disabled) return;
    fn(e);
  });
}

// ── Swipe-down on result panel to dismiss display box ──────────
let _swipeStartY = null;
const panel = $('result-panel');
panel.addEventListener('pointerdown', e => { _swipeStartY = e.clientY; });
panel.addEventListener('pointerup',   e => {
  if (_swipeStartY === null) return;
  const dy = e.clientY - _swipeStartY;
  _swipeStartY = null;
  if (dy > 50) dismissDisplay();
});

function dismissDisplay() {
  S.displayMode = 'none';
  $('display-box').className = '';
  $('hint-btn').classList.remove('lit');
  $('reveal-btn').classList.remove('lit');
}

// ── Wire interactive elements ──────────────────────────────────
onTap($('track-selector-btn'), openPicker);
onTap($('hint-btn'),    showHint);
onTap($('reveal-btn'),  showReveal);
onTap($('stop-btn'),    doStop);
onTap($('display-box'), dismissDisplay);
onTap($('picker-done'), closePicker);
onTap($('picker-overlay'), closePicker);
onTap($('library-btn'), () => { window.location.href = '/library'; });
$('picker-sheet').addEventListener('pointerdown', e => e.stopPropagation());

// ── Picker ─────────────────────────────────────────────────────
function openPicker() {
  buildPickerList();
  $('picker-overlay').classList.add('open');
}
function closePicker() {
  $('picker-overlay').classList.remove('open');
}
function buildPickerList() {
  $('picker-title').textContent = `Playlist (${S.playlist.length})`;
  const list = $('picker-list');
  list.innerHTML = '';
  S.playlist.forEach(p => {
    const div = document.createElement('div');
    div.className = 'picker-item' + (p.id === S.activeProfileId ? ' selected' : '');
    div.innerHTML = `<span class="picker-item-text">Track ${p.order} \u2014 ${p.name}</span>
                     <span class="picker-check">\u2713</span>`;
    onTap(div, () => { selectProfile(p.id); closePicker(); });
    list.appendChild(div);
  });
}

// ── Render ─────────────────────────────────────────────────────
function render(next) {
  const btnChanged     = next.lastButton     !== S.lastButton;
  const profileChanged = next.activeProfileId !== S.activeProfileId;
  Object.assign(S, next);

  const profile = S.playlist.find(p => p.id === S.activeProfileId) || {};
  $('selector-text').textContent = profile.order
    ? `Track ${profile.order} \u2014 ${profile.name}`
    : (profile.name || 'Select Track');
  $('instruction-text').textContent = S.instruction || '';

  $('btn-label').textContent = S.lastButton
    ? `Button ${S.lastButton}`
    : 'No button selected';

  if (btnChanged && S.lastButton) {
    $('btn-label').style.color = rowColor(S.lastButton);
    setTimeout(() => $('btn-label').style.color = '', 400);
  }

  if (btnChanged || profileChanged) dismissDisplay();

  const hasBtn  = !!S.lastButton;
  const hasHint = hasBtn && !!S.hint;
  $('reveal-btn').disabled    = !hasBtn;
  $('hint-btn').disabled      = !hasHint;
  $('hint-btn').style.display = (hasBtn && !hasHint) ? 'none' : 'flex';
}

// ── Display actions ────────────────────────────────────────────
function showHint() {
  if (!S.hint) return;
  S.displayMode = 'hint';
  $('display-box').className       = 'hint-mode';
  $('display-content').textContent = S.hint;
  $('hint-btn').classList.add('lit');
  $('reveal-btn').classList.remove('lit');
}

function showReveal() {
  if (!S.lastButton) return;
  S.displayMode = 'answer';
  $('display-box').className       = 'answer-mode';
  $('display-content').textContent = S.answer || 'No answer available';
  $('reveal-btn').classList.add('lit');
  $('hint-btn').classList.remove('lit');
}

async function doStop() {
  try { await fetch('/api/stop', { method: 'POST' }); } catch(e) {}
}

async function selectProfile(id) {
  try {
    await fetch(`/api/profile/select/${id}`, { method: 'POST' });
    await poll();
  } catch(e) {}
}

async function poll() {
  try {
    const d = await (await fetch('/api/state')).json();
    render({
      activeProfileId: d.active_profile_id,
      playlist:        d.playlist,
      lastButton:      d.last_button,
      hint:            d.hint,
      answer:          d.answer,
      instruction:     d.instruction,
    });
  } catch(e) {}
}

poll();
setInterval(poll, 500);
</script>
</body>
</html>
